<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>自己理解のポイント - 全校進路ガイダンス</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    cursor: none;
  }
  .slide-container {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  .slide {
    display: none;
    max-width: 100vw;
    max-height: 100vh;
  }
  .slide.active {
    display: block;
  }
  .slide img {
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    display: block;
  }
  .slide-counter {
    position: fixed;
    bottom: 8px;
    left: 20px;
    color: #555;
    font-family: sans-serif;
    font-size: 14px;
    z-index: 9999;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="slide-container" id="container">
  <div class="slide active" data-slide="0"><img src="スライドPNG/スライド01.png" alt="表紙"></div>
  <div class="slide" data-slide="1"><img src="スライドPNG/スライド02.png" alt="掴み"></div>
  <div class="slide" data-slide="2"><img src="スライドPNG/スライド03.png" alt="世論の声"></div>
  <div class="slide" data-slide="3"><img src="スライドPNG/スライド04.png" alt="力説"></div>
  <div class="slide" data-slide="4"><img src="スライドPNG/スライド05.png" alt="姿見の導入"></div>
  <div class="slide" data-slide="5"><img src="スライドPNG/スライド06.png" alt="姿見の核心"></div>
  <div class="slide" data-slide="6"><img src="スライドPNG/スライド07.png" alt="内面の鏡は人"></div>
  <div class="slide" data-slide="7"><img src="スライドPNG/スライド08.png" alt="人間＝あわい"></div>
  <div class="slide" data-slide="8"><img src="スライドPNG/スライド09.png" alt="キーメッセージ"></div>
  <div class="slide" data-slide="9"><img src="スライドPNG/スライド10.png" alt="できるよ→すごいね"></div>
  <div class="slide" data-slide="10"><img src="スライドPNG/スライド11.png" alt="できない→やってあげる"></div>
  <div class="slide" data-slide="11"><img src="スライドPNG/スライド12.png" alt="弱みを出すと強みが残る"></div>
  <div class="slide" data-slide="12"><img src="スライドPNG/スライド13.png" alt="苦手に囲まれる人生嫌じゃん"></div>
  <div class="slide" data-slide="13"><img src="スライドPNG/スライド14.png" alt="仮のものさしを握れ"></div>
  <div class="slide" data-slide="14"><img src="スライドPNG/スライド15.png" alt="自己開示の手紙"></div>
  <div class="slide" data-slide="15"><img src="スライドPNG/スライド16.png" alt="24369+締め"></div>
</div>

<div class="slide-counter" id="counter">1 / 16</div>

<script>
  const slides = document.querySelectorAll('.slide');
  const counter = document.getElementById('counter');
  const container = document.getElementById('container');
  let current = 0;
  const total = slides.length;

  function showSlide(n) {
    slides[current].classList.remove('active');
    current = Math.max(0, Math.min(n, total - 1));
    slides[current].classList.add('active');
    counter.textContent = (current + 1) + ' / ' + total;
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ' || e.key === 'PageDown') {
      e.preventDefault();
      showSlide(current + 1);
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') {
      e.preventDefault();
      showSlide(current - 1);
    } else if (e.key === 'Home') {
      e.preventDefault();
      showSlide(0);
    } else if (e.key === 'End') {
      e.preventDefault();
      showSlide(total - 1);
    } else if (e.key === 'f' || e.key === 'F') {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }
  });

  container.addEventListener('click', function(e) {
    if (e.clientX > window.innerWidth / 2) {
      showSlide(current + 1);
    } else {
      showSlide(current - 1);
    }
  });
</script>

</body>
</html>
